{% extends 'base.html' %}
{% block title %}Post Notice - Smart College Assistant{% endblock %}

{% block content %}
<div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4 mb-10">
    <div>
        <h1 class="text-2xl md:text-3xl font-extrabold text-white tracking-tight">Post a Notice</h1>
        <p class="text-portal-textMuted text-sm mt-1">This announcement will be displayed on all student/teacher dashboards</p>
    </div>
    <a href="{% url 'dashboard' %}" class="border border-portal-border hover:border-portal-primary hover:text-white text-portal-textMuted font-bold text-xs py-2.5 px-5 rounded-lg flex items-center gap-1.5 transition-all self-start md:self-auto">
        <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i> Back to Dashboard
    </a>
</div>

<div class="bg-portal-card border border-portal-border rounded-xl p-6 md:p-8 shadow-2xl max-w-2xl mx-auto">
    <form method="post" action="{% url 'create_notice' %}" class="space-y-5">
        {% csrf_token %}
        <div>
            <label for="title" class="block text-xs font-semibold text-portal-textMuted uppercase tracking-wider mb-2">Notice Title</label>
            <input type="text" name="title" id="title" class="w-full px-4 py-2.5 bg-black/25 border border-portal-border rounded-lg text-white text-sm outline-none transition-all focus:border-portal-primary focus:ring-1 focus:ring-portal-primary" placeholder="e.g. End Semester Exams Schedule" required>
        </div>
        <div>
            <label for="description" class="block text-xs font-semibold text-portal-textMuted uppercase tracking-wider mb-2">Announcement Details</label>
            <textarea name="description" id="description" class="w-full px-4 py-2.5 bg-black/25 border border-portal-border rounded-lg text-white text-sm outline-none transition-all focus:border-portal-primary focus:ring-1 focus:ring-portal-primary" rows="6" placeholder="Write notice content here..." required style="resize: vertical;"></textarea>
        </div>
        
        <button type="submit" class="w-full bg-portal-primary hover:bg-portal-primaryHover text-slate-950 font-bold text-sm py-3 px-4 rounded-lg transition-all flex items-center justify-center gap-2 shadow-lg shadow-amber-500/5 active:scale-[0.99] mt-2">
            <i data-lucide="send" class="w-4 h-4"></i> Post Announcement
        </button>
    </form>
</div>
{% endblock %}
